name: Build B.A.D.E.G APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # Hapus langkah 'chmod +x gradlew' dan ganti langkah build-nya dengan ini:
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK (Includes C++ Compilation via CMake)
      run: gradle assembleDebug # <-- Perhatikan: kita pakai 'gradle', bukan './gradlew'

    - name: Upload APK to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BADEG-App-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 1
